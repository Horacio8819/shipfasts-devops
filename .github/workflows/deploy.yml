name: ShipFast CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "ShipFast deploy" \
            --parameters 'commands=[
              "set -e",
              "sudo git config --system --add safe.directory /var/www/shipfasts",
              "if [ ! -d /var/www/shipfasts/.git ]; then rm -rf /var/www/shipfasts/* && git clone https://github.com/'"${{ github.repository }}"' /var/www/shipfasts; fi",
              "cd /var/www/shipfasts",
              
              "git fetch --all",
              "git reset --hard origin/main",
              
              "npm install",
              "pm2 delete shipfast || true",
              "pm2 start /var/www/shipfasts/app.js --name shipfast --update-env",
              "pm2 save",
              "sudo systemctl reload nginx"
            ]'
